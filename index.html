<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivo de Tickets</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Archivo de Tickets</h1>

  <button class="botonModo" onclick="cambiarModo()">
    Cambiar vista día / noche
  </button>

  <div class="formulario">

    <label>Semana:</label>

    <select id="selectorSemana" onchange="cambiarSemana()"></select>

    <button onclick="crearSemanaActual()">
      Ir a semana actual
    </button>

    <h2 id="tituloSemana"></h2>

    <label>Tipo de ticket:</label>

    <select id="tipo">
      <option value="Desayuno">Desayuno</option>
      <option value="Almuerzo">Almuerzo</option>
      <option value="Cena">Cena</option>
    </select>

    <br><br>

    <input
      type="file"
      accept="image/*"
      capture="environment"
      id="fotoInput"
    >

    <div id="previewBox" style="display:none;">

      <h3>Foto antes de guardar</h3>

      <img id="previewFoto">

      <button onclick="eliminarFotoTemporal()">
        Eliminar foto y hacer otra
      </button>

    </div>

    <button onclick="guardarTicket()">
      Guardar ticket
    </button>

    <p id="mensajeGuardado"></p>

    <button onclick="generarPDF()">
      Generar PDF de esta semana
    </button>

  </div>

  <hr>

  <h2>Tickets de esta semana</h2>

  <div id="tickets"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="app.js"></script>

</body>
</html>
