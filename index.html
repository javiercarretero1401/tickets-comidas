<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Tickets</h1>

  <div class="formulario">

    <label>Tipo</label>

    <select id="tipo">
      <option>Desayuno</option>
      <option>Almuerzo</option>
      <option>Cena</option>
    </select>

    <br><br>

    <input
      type="file"
      id="fotoInput"
      accept="image/*"
      capture="environment"
    >

    <div id="previewBox" style="display:none;">

      <img id="previewFoto">

      <button onclick="eliminarFotoTemporal()">
        Eliminar foto
      </button>

    </div>

    <button onclick="guardarTicket()">
      Guardar ticket
    </button>

  </div>

  <hr>

  <h2 id="zonaTickets">
    Tickets guardados
  </h2>

  <div id="tickets"></div>

  <script src="app.js"></script>

</body>

</html>
